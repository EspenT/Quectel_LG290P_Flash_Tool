name: Build Tool Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libserialport

      - name: Build quectool (Windows x64)
        shell: msys2 {0}
        run: |
          gcc quectool.c -o quectool-windows-x64.exe -lserialport -lsetupapi -lcfgmgr32 -static

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-windows-x64
          path: quectool-windows-x64.exe

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-libserialport

      - name: Build quectool (Windows ARM64)
        shell: msys2 {0}
        run: |
          clang quectool.c -o quectool-windows-arm64.exe -lserialport -lsetupapi -lcfgmgr32 -static

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-windows-arm64
          path: quectool-windows-arm64.exe

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libserialport

      - name: Build quectool (macOS arm64)
        run: |
          gcc $(pkg-config --cflags --libs libserialport) quectool.c -o quectool-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-macos-arm64
          path: quectool-macos-arm64

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libserialport

      - name: Build quectool (macOS x64)
        run: |
          gcc $(pkg-config --cflags --libs libserialport) quectool.c -o quectool-macos-x64 -arch x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-macos-x64
          path: quectool-macos-x64

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git automake autoconf libtool pkg-config gcc make

      - name: Build static libserialport
        run: |
          git clone https://github.com/sigrokproject/libserialport.git
          cd libserialport
          ./autogen.sh || autoreconf -i
          ./configure --enable-static --disable-shared --prefix=$PWD/../libserialport-prefix
          make -j"$(nproc)"
          make install

      - name: Build quectool (Linux x64)
        run: |
          export PKG_CONFIG_LIBDIR="$(pwd)/libserialport-prefix/lib/pkgconfig"
          gcc quectool.c -o quectool-linux-x64 $(pkg-config --cflags --static --libs libserialport)

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-linux-x64
          path: quectool-linux-x64

  build-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-arm-linux-gnueabihf automake autoconf libtool git make

      - name: Build static libserialport for ARM
        run: |
          git clone https://github.com/sigrokproject/libserialport.git
          cd libserialport
          autoreconf -i
          ./configure --host=arm-linux-gnueabihf --enable-static --disable-shared --prefix="$(pwd)/arm-prefix"
          make -j"$(nproc)"
          make install

      - name: Build quectool (Linux armhf)
        run: |
          export PKG_CONFIG_LIBDIR="$(pwd)/libserialport/arm-prefix/lib/pkgconfig"
          arm-linux-gnueabihf-gcc quectool.c -o quectool-linux-armhf $(pkg-config --cflags --static --libs libserialport)

      - uses: actions/upload-artifact@v4
        with:
          name: quectool-linux-armhf
          path: quectool-linux-armhf

  release:
    needs:
      - build-windows-x64
      - build-windows-arm64
      - build-macos-arm64
      - build-macos-x64
      - build-linux-x64
      - build-linux-arm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
